
name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - uses: actions/setup-java@v4
        with: {distribution: 'zulu', java-version: '21'}
      
      - name: Prepare Assets
        run: |
          mkdir -p pages
          echo '<html><head><meta name="viewport" content="width=device-width, initial-scale=0.5, user-scalable=no"></head>
                <body style="background:#000;margin:0;"><script>window.location.href="1.html";</script></body></html>' > pages/index.html
      
      - name: Init Capacitor and Add Android
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets
          npx cap init "Anam's Ludo" com.app.builder435 --web-dir pages
          if [ -d "assets" ]; then
            npx capacitor-assets generate --android
          fi
          npx cap add android
          npx cap copy android

      - name: Upgrade Gradle to 8.9
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.9 --distribution-type all
          GRADLE_FILE="app/build.gradle"
          echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.9.0' } } }" >> $GRADLE_FILE
          echo "org.gradle.java.home=$JAVA_HOME_21_X64" >> gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Anam's-Ludo-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
